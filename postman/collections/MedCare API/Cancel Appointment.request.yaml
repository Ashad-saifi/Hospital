$kind: http-request
name: Cancel Appointment
method: DELETE
url: '{{baseUrl}}/api/appointments/{{appointmentId}}'
order: 6000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has success message", function() { pm.expect(pm.response.json().message).to.include('cancelled'); });
      pm.test("Response time is less than 2000ms", function() { pm.expect(pm.response.responseTime).to.be.below(2000); });

$kind: http-request
name: Signup
method: POST
url: 'http://localhost:5000/api/auth/signup'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john.doe@example.com",
      "password": "password123",
      "phone": "9876543210",
      "age": 30,
      "gender": "Male",
      "bloodGroup": "O+"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function() { pm.response.to.have.status(201); });
      pm.test("Response has user id", function() { pm.expect(pm.response.json()).to.have.property('id'); });
      pm.test("Response does not contain password", function() { pm.expect(pm.response.json()).to.not.have.property('password'); });
      pm.test("Response has correct email", function() { pm.expect(pm.response.json().email).to.eql('john.doe@example.com'); });
      pm.test("Response time is less than 2000ms", function() { pm.expect(pm.response.responseTime).to.be.below(2000); });
      pm.environment.set("userId", pm.response.json().id);
